version: 2

# 设计原则:
# - weekly + 周一早 06:00 BJT: 不打扰白天工作, 周一上班即见 PR
# - 分组合并: 同生态系统的小升级合一个 PR, 防收件箱被淹
# - 忽略 npm major: 容易破坏, 留人工评估; GHA major 允许 (官方仓库稳定)
# - 限制 PR 上限: 防止积压

updates:
  # GitHub Actions: 这次 Node 20 弃用就是被动反应, 启用后下次提前几个月就能看到 PR
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns: ["*"]
    labels:
      - "deps"
      - "ci"
    commit-message:
      prefix: "ci"
      include: "scope"

  # Frontend npm: ignore major (React/Vite/Recharts major 升级风险高, 留人工决策)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    labels:
      - "deps"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # Backend (uv): 原生读取 uv.lock + pyproject.toml, dependabot 直接 bump 锁定版本
  # 旧 pip 生态只放宽 pyproject 的 >= 下界, groups/ignore-major 对下界更新不生效
  #   → 表现为逐包独立 PR + major 泄漏(如 mypy), 故迁移到 uv 生态
  # ignore major: 数据栈 (pandas/akshare/yfinance) major 升级常含破坏性变更
  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    groups:
      uv-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    labels:
      - "deps"
      - "backend"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
