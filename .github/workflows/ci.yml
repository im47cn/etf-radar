name: CI

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'config/**'
      - '.github/workflows/ci.yml'

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v8.2.0
        id: setup-uv
        continue-on-error: true
        with:
          version: "0.11.x"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup uv (retry on transient network failure)
        if: steps.setup-uv.outcome == 'failure'
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.x"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install backend deps
        run: cd backend && uv sync --extra dev
      - name: Pytest
        run: cd backend && uv run pytest --tb=short
      - name: Ruff
        run: cd backend && uv run ruff check src tests
      - name: Mypy
        run: cd backend && uv run mypy src

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: ESLint
        run: cd frontend && npm run lint
      - name: Vitest
        run: cd frontend && npm test -- --run
      - name: Build
        run: cd frontend && npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium
      - name: Run Playwright tests (chromium only — firefox/webkit follow-up)
        run: cd frontend && npx playwright test --project=chromium
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
