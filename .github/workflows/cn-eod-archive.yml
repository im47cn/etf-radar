name: CN EOD Archive

on:
  schedule:
    - cron: '30 7 * * 1-5'   # 工作日 BJT 15:30 (UTC 07:30)
  workflow_dispatch:

permissions:
  contents: write
  actions: write   # 用于触发 deploy-frontend workflow

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Check CN trading day
        id: cal
        run: |
          pip install chinese-calendar -q
          is_trading=$(python -c "
          from datetime import datetime, timezone, timedelta
          import chinese_calendar
          today = (datetime.now(timezone.utc) + timedelta(hours=8)).date()
          ok = chinese_calendar.is_workday(today) and not chinese_calendar.is_holiday(today)
          print('true' if ok else 'false')
          ")
          echo "is_trading=$is_trading" >> $GITHUB_OUTPUT
          echo "trading_day=$is_trading"
      - uses: actions/checkout@v7
        if: steps.cal.outputs.is_trading == 'true'
        with:
          token: ${{ secrets.DATA_BOT_PAT }}
      - uses: astral-sh/setup-uv@v8.2.0
        if: steps.cal.outputs.is_trading == 'true'
        id: setup-uv
        continue-on-error: true
        with:
          version: "0.11.x"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup uv (retry on transient network failure)
        if: steps.cal.outputs.is_trading == 'true' && steps.setup-uv.outcome == 'failure'
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.x"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - if: steps.cal.outputs.is_trading == 'true'
        run: cd backend && uv sync --extra dev
      - name: Archive latest → snapshots/<today-bjt>
        if: steps.cal.outputs.is_trading == 'true'
        run: cd backend && uv run python -m src.pipeline --mode=archive --data-root=../data --config-dir=../config
      - name: Commit archive
        if: steps.cal.outputs.is_trading == 'true'
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # snapshots/ 是归档主体, latest/snapshots-index.json 是 archive 模式新写的索引
          git add data/snapshots/ data/latest/snapshots-index.json
          if git diff --staged --quiet; then
            echo "no archive changes, skip commit"
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "data: EOD archive $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push
          echo "changed=true" >> $GITHUB_OUTPUT
      - name: Trigger deploy
        # 仅在确有 commit 时部署, 避免无变化空跑
        if: steps.cal.outputs.is_trading == 'true' && steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy-frontend.yml --ref main
