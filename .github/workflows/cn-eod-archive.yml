name: CN EOD Archive

on:
  schedule:
    - cron: '30 7 * * 1-5'   # 工作日 BJT 15:30 (UTC 07:30)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v3
      - run: cd backend && uv sync --extra dev
      - name: Archive latest → snapshots/<today-bjt>
        run: cd backend && uv run python -m src.pipeline --mode=archive --data-root=../data --config-dir=../config
      - name: Commit archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add data/snapshots/
          git diff --staged --quiet || git commit -m "data: EOD archive $(date -u +%Y-%m-%d)"
          git push
