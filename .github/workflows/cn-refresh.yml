name: CN Refresh

on:
  schedule:
    - cron: '15 1 * * 1-5'              # 09:15 BJT 全量
    - cron: '30,45 1 * * 1-5'           # 09:30, 09:45 BJT (盘中刷价)
    - cron: '*/15 2-3 * * 1-5'          # 10:00-11:45 BJT 每 15min (盘中刷价)
    - cron: '*/15 5-7 * * 1-5'          # 13:00-15:45 BJT 每 15min (盘中刷价)
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Check CN trading day
        id: cal
        run: |
          pip install chinese-calendar -q
          is_trading=$(python -c "
          from datetime import datetime, timezone, timedelta
          import chinese_calendar
          today = (datetime.now(timezone.utc) + timedelta(hours=8)).date()
          ok = chinese_calendar.is_workday(today) and not chinese_calendar.is_holiday(today)
          print('true' if ok else 'false')
          ")
          echo "is_trading=$is_trading" >> $GITHUB_OUTPUT
          echo "trading_day=$is_trading"
      - uses: actions/checkout@v7
        if: steps.cal.outputs.is_trading == 'true'
        with:
          token: ${{ secrets.DATA_BOT_PAT }}
      - uses: astral-sh/setup-uv@v8.3.2
        if: steps.cal.outputs.is_trading == 'true'
        id: setup-uv
        continue-on-error: true
        with:
          version: "0.11.x"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup uv (retry on transient network failure)
        if: steps.cal.outputs.is_trading == 'true' && steps.setup-uv.outcome == 'failure'
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.x"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - if: steps.cal.outputs.is_trading == 'true'
        run: cd backend && uv sync --extra dev --frozen
      - name: Decide mode
        if: steps.cal.outputs.is_trading == 'true'
        id: mode
        run: |
          # 仅 01:15 UTC (09:15 BJT) 跑 full 模式; 其余 intraday
          UTC_HOUR=$(date -u +%-H)
          UTC_MIN=$(date -u +%-M)
          if [ "$UTC_HOUR" = "1" ] && [ "$UTC_MIN" -ge "10" ] && [ "$UTC_MIN" -lt "25" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=intraday" >> $GITHUB_OUTPUT
          fi
      - name: Run pipeline
        if: steps.cal.outputs.is_trading == 'true'
        run: cd backend && uv run python -m src.pipeline --mode=${{ steps.mode.outputs.mode }} --data-root=../data --config-dir=../config
        continue-on-error: true
      - name: Refresh dapanyuntu breadth (QC 对账源)
        if: steps.cal.outputs.is_trading == 'true'
        # dapanyuntu 第三方接口, 失败不阻断; 现降级为 QC 对账源, 写 qc_dapanyuntu.json
        run: cd backend && uv run python -m src.market_breadth.pipeline --data-root=../data
        continue-on-error: true
      - name: Compute self breadth (个股 MA20/60/120, 主展示)
        if: steps.cal.outputs.is_trading == 'true'
        # 读 close_series + 巨潮映射, 产出 market_temperature.json (schema 2.0)
        run: cd backend && uv run python -m src.market_breadth.self_breadth --data-root=../data
        continue-on-error: true
      - name: Reconcile self vs dapanyuntu (全市场 MA20 QC)
        if: steps.cal.outputs.is_trading == 'true'
        run: cd backend && uv run python -m src.market_breadth.reconcile --data-root=../data
        continue-on-error: true
      - name: Compute commit metadata
        if: steps.cal.outputs.is_trading == 'true'
        id: meta
        run: echo "ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - name: Commit data
        if: steps.cal.outputs.is_trading == 'true'
        uses: ./.github/actions/commit-and-push
        with:
          paths: data/latest/
          message: "data: CN ${{ steps.mode.outputs.mode }} ${{ steps.meta.outputs.ts }}"
      - name: Trigger deploy
        if: steps.cal.outputs.is_trading == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy-frontend.yml --ref main
