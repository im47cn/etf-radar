name: health-monitor

on:
  schedule:
    # 每小时 05 分巡检（数据新鲜度 + 关键 workflow 运行状态）。可后续按交易时段加密。
    - cron: '5 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '仅打印 findings, 不 dispatch/告警 (灰度)'
        type: boolean
        default: true
      test_alert:
        description: '仅发一条测试告警验证 Server酱 渠道后退出 (不巡检)'
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

concurrency:
  group: health-monitor

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
      # 触发补偿 workflow + 查 run 状态需 actions:write 的 PAT。
      GH_TOKEN: ${{ secrets.DATA_BOT_PAT }}
      # 灰度期已过(2026-07-09 CI dry-run 0 findings 验证干净), 定时触发开真自愈。
      # 手动 dispatch 仍以 input 为准(默认 true=dry, 便于安全演练); 定时触发走此默认 '0'。
      HEALTH_DRY_RUN: ${{ github.event.inputs.dry_run || '0' }}
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.DATA_BOT_PAT }}
          # 不把 PAT 持久化到 .git/config, 减少后续第三方步骤(uv sync/python)的凭据暴露面。
          # push 由 Commit 步骤显式设置带 token 的 remote URL 完成。
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install uv
        run: pip install uv
      - name: Install deps
        run: cd backend && uv sync --all-extras --frozen
      - name: Test alert channel (仅 test_alert=true)
        if: github.event.inputs.test_alert == 'true'
        run: cd backend && uv run python -m src.notify.alert --test
      - name: Run health monitor
        if: github.event.inputs.test_alert != 'true'
        run: |
          cd backend
          if [ "$HEALTH_DRY_RUN" = "1" ] || [ "$HEALTH_DRY_RUN" = "true" ]; then
            uv run python -m src.health_monitor --data-root ../data --dry-run
          else
            uv run python -m src.health_monitor --data-root ../data
          fi
      - name: Setup push credentials
        if: env.HEALTH_DRY_RUN != '1' && env.HEALTH_DRY_RUN != 'true'
        env:
          DATA_BOT_PAT: ${{ secrets.DATA_BOT_PAT }}
        # checkout 关闭了凭据持久化(persist-credentials: false, 限制 PAT 暴露),
        # 这里显式设置带 token 的 remote URL 供 commit-and-push action 的 push 使用。
        # git remote 配置写盘, 同 job 跨 step 持久, 后续 action step 会复用。
        run: git remote set-url origin "https://x-access-token:${DATA_BOT_PAT}@github.com/${GITHUB_REPOSITORY}.git"
      - name: Compute commit metadata
        if: env.HEALTH_DRY_RUN != '1' && env.HEALTH_DRY_RUN != 'true'
        id: meta
        run: echo "ts=$(date -u +%FT%TZ)" >> "$GITHUB_OUTPUT"
      - name: Commit heal_state
        if: env.HEALTH_DRY_RUN != '1' && env.HEALTH_DRY_RUN != 'true'
        uses: ./.github/actions/commit-and-push
        with:
          paths: data/health/
          message: "chore: health heal_state ${{ steps.meta.outputs.ts }}"
          user-name: data-bot
          user-email: data-bot@users.noreply.github.com
