name: Holdings Refresh

on:
  schedule:
    - cron: '30 0 1 * *'      # 每月 1 日 00:30 UTC (08:30 BJT)
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: holdings-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.DATA_BOT_PAT }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v8.3.2
        id: setup-uv
        continue-on-error: true
        with:
          version: "0.11.x"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup uv (retry on transient network failure)
        if: steps.setup-uv.outcome == 'failure'
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.x"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: cd backend && uv sync --extra dev --frozen
      - name: Run holdings pipeline
        run: cd backend && uv run python -m src.holdings_pipeline --data-root=../data --config-dir=../config
      - name: Compute commit metadata
        id: meta
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
      - name: Commit holdings
        uses: ./.github/actions/commit-and-push
        with:
          paths: data/holdings/
          message: "data: refresh ETF holdings ${{ steps.meta.outputs.date }}"
      - name: Trigger deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy-frontend.yml --ref main
