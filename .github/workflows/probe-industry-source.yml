name: probe-industry-source

# 一次性诊断 (M0 spike): 实测东财/申万行业成分接口在 GitHub Actions 出口 IP 的可用性.
# 只读、不提交任何数据. 用完即可删除本文件.

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install akshare
        run: pip install akshare
      - name: Probe industry sources
        run: |
          python - <<'PY'
          import akshare as ak, time
          print("akshare", ak.__version__)

          def probe(label, fn, retries=5, delay=3):
              ok = 0
              last = None
              t0 = time.time()
              for i in range(retries):
                  try:
                      r = fn()
                      ok += 1
                      last = r
                  except Exception as e:
                      print(f"  [{label}] try {i+1}/{retries} FAIL: {type(e).__name__} {str(e)[:80]}")
                      time.sleep(delay)
              dt = time.time() - t0
              rate = f"{ok}/{retries}"
              shp = getattr(last, "shape", None)
              print(f"==> [{label}] success {rate}, last_shape={shp} ({dt:.1f}s)")
              return last

          # 1. 东财行业板块名 (对账所需的同源)
          names = probe("EM board_industry_name", lambda: ak.stock_board_industry_name_em())

          # 2. 东财单行业成分 (真正要用的 membership 调用)
          probe("EM cons(半导体)", lambda: ak.stock_board_industry_cons_em(symbol="半导体"))

          # 3. 若 name 拿到, 抽 5 个行业连续拉成分, 估算全量 86 次的整体成功概率
          if names is not None and hasattr(names, "iloc"):
              sample = names["板块名称"].tolist()[:5] if "板块名称" in names.columns else names.iloc[:5, 1].tolist()
              got = 0
              for nm in sample:
                  try:
                      c = ak.stock_board_industry_cons_em(symbol=str(nm))
                      got += 1
                      print(f"  cons({nm}) OK rows={len(c)}")
                  except Exception as e:
                      print(f"  cons({nm}) FAIL {type(e).__name__}")
                  time.sleep(2)
              print(f"==> EM cons 抽样 {got}/{len(sample)} 成功")

          # 4. 申万对照 (回退候选)
          probe("SW second_info", lambda: ak.sw_index_second_info(), retries=2)
          PY
