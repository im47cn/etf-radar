name: stocks-daily

on:
  schedule:
    # UTC 08:30 = BJT 16:30，A 股收盘后 30 min
    - cron: '30 8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stocks-daily

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.DATA_BOT_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        run: pip install uv
      - name: Install deps
        run: cd backend && uv sync --all-extras
      - name: Run daily pipeline
        run: cd backend && uv run python -m src.stocks_daily_pipeline --data-root ../data
      - name: Commit & push
        run: |
          git config user.name "data-bot"
          git config user.email "data-bot@users.noreply.github.com"
          git add data/stocks/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "data: stocks daily $(date -u +%FT%TZ)"
            git push
          fi
