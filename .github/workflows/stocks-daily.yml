name: stocks-daily

on:
  schedule:
    # UTC 08:30 = BJT 16:30，A 股收盘后 30 min
    - cron: '30 8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stocks-daily

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Check CN trading day
        id: cal
        run: |
          pip install chinese-calendar -q
          is_trading=$(python -c "
          from datetime import datetime, timezone, timedelta
          import chinese_calendar
          today = (datetime.now(timezone.utc) + timedelta(hours=8)).date()
          ok = chinese_calendar.is_workday(today) and not chinese_calendar.is_holiday(today)
          print('true' if ok else 'false')
          ")
          echo "is_trading=$is_trading" >> $GITHUB_OUTPUT
          echo "trading_day=$is_trading"
      - uses: actions/checkout@v7
        if: steps.cal.outputs.is_trading == 'true'
        with:
          token: ${{ secrets.DATA_BOT_PAT }}
      - name: Install uv
        if: steps.cal.outputs.is_trading == 'true'
        run: pip install uv
      - name: Install deps
        if: steps.cal.outputs.is_trading == 'true'
        run: cd backend && uv sync --all-extras --frozen
      - name: Run daily pipeline
        if: steps.cal.outputs.is_trading == 'true'
        run: cd backend && uv run python -m src.stocks_daily_pipeline --data-root ../data
      - name: Compute commit metadata
        if: steps.cal.outputs.is_trading == 'true'
        id: meta
        run: echo "ts=$(date -u +%FT%TZ)" >> "$GITHUB_OUTPUT"
      # daily 增量 append data/stocks/, 与并发 workflow(spot/industry-map/backfill)
      # 可能同时 push 冲突. action 内 rebase 到最新 origin 后再 push, 带有界重试.
      - name: Commit & push
        if: steps.cal.outputs.is_trading == 'true'
        uses: ./.github/actions/commit-and-push
        with:
          paths: data/stocks/
          message: "data: stocks daily ${{ steps.meta.outputs.ts }}"
          user-name: data-bot
          user-email: data-bot@users.noreply.github.com
      - name: Detect gaps & self-heal
        if: steps.cal.outputs.is_trading == 'true'
        env:
          GH_TOKEN: ${{ secrets.DATA_BOT_PAT }}
          # 灰度开关: 默认 '0'(仅检测并打印, 不 dispatch), 避免合入即无意自动触发回填。
          # 灰度观察无误后, 在仓库 Variables 设 SELF_HEAL_DISPATCH=1 开启真自愈, 无需改代码。
          SELF_HEAL_DISPATCH: ${{ vars.SELF_HEAL_DISPATCH || '0' }}
        run: |
          set +e
          cd backend && uv run python -m src.stocks_continuity --data-root ../data
          code=$?
          set -e
          if [ "$code" = "3" ]; then
            echo "gap detected → self-heal"
            if [ "$SELF_HEAL_DISPATCH" = "1" ]; then
              gh workflow run stocks-history-backfill.yml -f days=150 -f max_workers=8
              echo "dispatched stocks-history-backfill"
            else
              echo "SELF_HEAL_DISPATCH!=1, dry-run only (no dispatch)"
            fi
          elif [ "$code" != "0" ]; then
            exit $code   # 非预期错误, 响亮失败
          fi
