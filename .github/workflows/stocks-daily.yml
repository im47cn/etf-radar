name: stocks-daily

on:
  schedule:
    # UTC 08:30 = BJT 16:30，A 股收盘后 30 min
    - cron: '30 8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stocks-daily

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check CN trading day
        id: cal
        run: |
          pip install chinese-calendar -q
          is_trading=$(python -c "
          from datetime import datetime, timezone, timedelta
          import chinese_calendar
          today = (datetime.now(timezone.utc) + timedelta(hours=8)).date()
          ok = chinese_calendar.is_workday(today) and not chinese_calendar.is_holiday(today)
          print('true' if ok else 'false')
          ")
          echo "is_trading=$is_trading" >> $GITHUB_OUTPUT
          echo "trading_day=$is_trading"
      - uses: actions/checkout@v4
        if: steps.cal.outputs.is_trading == 'true'
        with:
          token: ${{ secrets.DATA_BOT_PAT }}
      - name: Install uv
        if: steps.cal.outputs.is_trading == 'true'
        run: pip install uv
      - name: Install deps
        if: steps.cal.outputs.is_trading == 'true'
        run: cd backend && uv sync --all-extras
      - name: Run daily pipeline
        if: steps.cal.outputs.is_trading == 'true'
        run: cd backend && uv run python -m src.stocks_daily_pipeline --data-root ../data
      - name: Commit & push
        if: steps.cal.outputs.is_trading == 'true'
        run: |
          git config user.name "data-bot"
          git config user.email "data-bot@users.noreply.github.com"
          git add data/stocks/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "data: stocks daily $(date -u +%FT%TZ)"
            git push
          fi
