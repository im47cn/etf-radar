name: stocks-history-backfill

on:
  workflow_dispatch:
    inputs:
      days:
        description: '回溯天数（默认 150，支撑 MA120 宽度；给 60 日指标留 buffer）'
        default: '150'
        required: true
      max_workers:
        description: 'akshare 并发数（默认 1：PyMiniRacer V8 在 macOS arm64 多线程必 crash，Linux runner 未验证，保守起见单线程）'
        default: '1'
        required: true

permissions:
  contents: write

concurrency:
  group: stocks-history-backfill

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # 单 worker 5531 只 ~90min; 150 天 backfill 需更长 (45min 会超时被 cancel)
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.DATA_BOT_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        run: pip install uv
      - name: Install deps
        run: cd backend && uv sync --all-extras
      - name: Run backfill
        run: |
          cd backend && uv run python -m src.stocks_history_pipeline \
            --data-root ../data \
            --days ${{ inputs.days }} \
            --max-workers ${{ inputs.max_workers }}
      - name: Commit & push
        run: |
          git config user.name "data-bot"
          git config user.email "data-bot@users.noreply.github.com"
          git add data/stocks/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "data: stocks history backfill $(date -u +%FT%TZ)"
            # backfill 耗时长(~90min), 期间 main 常已前进; 先 rebase 再推, 否则数据丢失
            git pull --rebase
            git push
          fi
