name: stocks-history-backfill

on:
  workflow_dispatch:
    inputs:
      days:
        description: '回溯天数（默认 150，支撑 MA120 宽度；给 60 日指标留 buffer）'
        default: '150'
        required: true
      max_workers:
        description: 'akshare 并发数（默认 8：ubuntu-latest 无 macOS arm64 的 PyMiniRacer V8 崩溃问题，HTTP 走 Session 线程安全；单线程 5531 只 ~90min 有超时风险，8 并发 ~11min）'
        default: '8'
        required: true

permissions:
  contents: write

concurrency:
  group: stocks-history-backfill

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # 8 并发 5531 只 ~11-23min; 保留 120min 作安全上限(限流/退化时兜底)
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.DATA_BOT_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        run: pip install uv
      - name: Install deps
        run: cd backend && uv sync --all-extras
      - name: Run backfill
        run: |
          cd backend && uv run python -m src.stocks_history_pipeline \
            --data-root ../data \
            --days ${{ inputs.days }} \
            --max-workers ${{ inputs.max_workers }}
      - name: Commit & push
        run: |
          git config user.name "data-bot"
          git config user.email "data-bot@users.noreply.github.com"
          if git diff --quiet -- data/stocks/; then
            echo "no changes"; exit 0
          fi
          # backfill 整体重算 data/stocks/ (与 daily 增量 append 会 rebase 冲突).
          # 策略: 保存重算结果 -> reset 到最新 origin -> 覆盖 -> 提交 -> 推(带重试).
          # 我方(整体重算)对 data/stocks/ 获胜, 其余文件取最新 origin.
          rm -rf /tmp/bf-stocks && cp -a data/stocks /tmp/bf-stocks
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            rm -rf data/stocks && cp -a /tmp/bf-stocks data/stocks
            git add data/stocks/
            git commit -m "data: stocks history backfill $(date -u +%FT%TZ)" || { echo "nothing to commit"; exit 0; }
            git push && { echo "pushed"; exit 0; } || { echo "push rejected, retry $i"; sleep 10; }
          done
          echo "push failed after retries"; exit 1
