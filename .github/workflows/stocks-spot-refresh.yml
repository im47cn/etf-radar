name: Stocks Spot Refresh

# 个股盘口快照独立 cron。30 分钟一次，覆盖 A 股 09:00-15:30 BJT。
# 不触发 deploy-frontend；下次 cn-refresh.yml 会带飞部署（最坏延迟 15 min）。

on:
  schedule:
    - cron: '*/30 1-7 * * 1-5'  # UTC 01:00-07:30 = BJT 09:00-15:30，工作日
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stocks-spot-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Check CN trading day
        id: cal
        run: |
          pip install chinese-calendar -q
          is_trading=$(python -c "
          from datetime import datetime, timezone, timedelta
          import chinese_calendar
          today = (datetime.now(timezone.utc) + timedelta(hours=8)).date()
          ok = chinese_calendar.is_workday(today) and not chinese_calendar.is_holiday(today)
          print('true' if ok else 'false')
          ")
          echo "is_trading=$is_trading" >> $GITHUB_OUTPUT
          echo "trading_day=$is_trading"
      - uses: actions/checkout@v7
        if: steps.cal.outputs.is_trading == 'true'
        with:
          token: ${{ secrets.DATA_BOT_PAT }}
      - uses: astral-sh/setup-uv@v8.2.0
        if: steps.cal.outputs.is_trading == 'true'
        id: setup-uv
        continue-on-error: true
        with:
          version: "0.11.x"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup uv (retry on transient network failure)
        if: steps.cal.outputs.is_trading == 'true' && steps.setup-uv.outcome == 'failure'
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.x"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - if: steps.cal.outputs.is_trading == 'true'
        run: cd backend && uv sync --extra dev
      - name: Run stocks_spot pipeline
        if: steps.cal.outputs.is_trading == 'true'
        run: cd backend && uv run python -m src.stocks_spot_pipeline --data-root=../data
      - name: Commit stocks_spot
        if: steps.cal.outputs.is_trading == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest/stocks_spot.json
          if git diff --staged --quiet; then
            echo "no stocks_spot changes, skip commit"
            exit 0
          fi
          git commit -m "data: stocks_spot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase
          git push
