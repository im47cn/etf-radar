name: US Refresh

on:
  schedule:
    - cron: '30 22 * * 1-5'  # 工作日 BJT 06:30 (UTC 22:30 前一天)
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Check NYSE trading day
        id: cal
        run: |
          pip install holidays -q
          is_trading=$(python -c "
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import holidays
          today_et = datetime.now(ZoneInfo('America/New_York')).date()
          nyse = holidays.financial_holidays('NYSE')
          is_weekend = today_et.weekday() >= 5
          is_holiday = today_et in nyse
          print('true' if (not is_weekend and not is_holiday) else 'false')
          ")
          echo "is_trading=$is_trading" >> $GITHUB_OUTPUT
          echo "trading_day=$is_trading"
      - uses: actions/checkout@v7
        if: steps.cal.outputs.is_trading == 'true'
        with:
          token: ${{ secrets.DATA_BOT_PAT }}
      - uses: astral-sh/setup-uv@v8.3.2
        if: steps.cal.outputs.is_trading == 'true'
        id: setup-uv
        continue-on-error: true
        with:
          version: "0.11.x"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup uv (retry on transient network failure)
        if: steps.cal.outputs.is_trading == 'true' && steps.setup-uv.outcome == 'failure'
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.x"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install backend deps
        if: steps.cal.outputs.is_trading == 'true'
        run: cd backend && uv sync --extra dev --frozen
      - name: Run pipeline (full)
        if: steps.cal.outputs.is_trading == 'true'
        run: cd backend && uv run python -m src.pipeline --mode=full --data-root=../data --config-dir=../config
        continue-on-error: true
      - name: Commit data
        if: steps.cal.outputs.is_trading == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest/
          if git diff --staged --quiet; then
            echo "no data changes, skip commit"
            exit 0
          fi
          git commit -m "data: US refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase
          git push
      - name: Trigger deploy
        if: steps.cal.outputs.is_trading == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy-frontend.yml --ref main
