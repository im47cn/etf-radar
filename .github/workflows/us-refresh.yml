name: US Refresh

on:
  schedule:
    - cron: '30 22 * * 1-5'  # 工作日 BJT 06:30 (UTC 22:30 前一天)
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v8.2.0
        id: setup-uv
        continue-on-error: true
        with:
          version: "0.11.x"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup uv (retry on transient network failure)
        if: steps.setup-uv.outcome == 'failure'
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.x"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install backend deps
        run: cd backend && uv sync --extra dev
      - name: Run pipeline (full)
        run: cd backend && uv run python -m src.pipeline --mode=full --data-root=../data --config-dir=../config
        continue-on-error: true
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest/
          if git diff --staged --quiet; then
            echo "no data changes, skip commit"
            exit 0
          fi
          git commit -m "data: US refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase
          git push
      - name: Trigger deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy-frontend.yml --ref main
